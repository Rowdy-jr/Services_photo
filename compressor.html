<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Compressor | Bhoya Online</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #ff007f;
            --glass: rgba(15, 15, 35, 0.75);
            --border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #020024 0%, #090979 35%, #00d4ff 100%);
            background-size: 400% 400%;
            animation: galaxyMove 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        @keyframes galaxyMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 90vw;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        h1 { 
            font-size: 2rem; 
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            margin-bottom: 5px;
        }

        .tagline { font-size: 0.85rem; color: #b3c2d1; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }

        .upload-area {
            border: 2px dashed var(--neon-blue);
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 25px;
            background: rgba(0, 210, 255, 0.05);
        }

        .upload-area:hover { background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        #file-input { display: none; }

        .quality-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            opacity: 0.4;
            pointer-events: none;
        }

        .q-btn {
            flex: 1;
            padding: 12px 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .q-btn.active {
            background: var(--neon-purple);
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .stat-box { display: flex; flex-direction: column; gap: 5px; }
        .stat-label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 1.2rem; font-weight: bold; color: var(--neon-blue); }
        .stat-value.success { color: var(--neon-pink); }

        .btn-download {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
            transition: 0.3s;
            opacity: 0;
            pointer-events: none;
        }

        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--neon-pink); }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>GALAXY COMPRESSOR</h1>
        <p class="tagline">Maximum Polish • Minimum Size</p>

        <label class="upload-area" for="file-input">
            <h2 id="upload-text">📂 Click or Drop Image Here</h2>
        </label>
        <input type="file" id="file-input" accept="image/*">

        <!-- Quality settings mapping to JS values -->
        <div class="quality-selector" id="controls">
            <button class="q-btn active" data-quality="0.92">High</button>
            <button class="q-btn" data-quality="0.85">Mid</button>
            <button class="q-btn" data-quality="0.75">Low</button>
            <button class="q-btn" data-quality="0.65">Extreme</button>
        </div>

        <div class="stats-panel" id="stats">
            <div class="stat-box">
                <span class="stat-label">Original Size</span>
                <span class="stat-value" id="size-old">0 KB</span>
            </div>
            <div class="stat-box" style="align-items: center;">
                <span class="stat-label">Reduction</span>
                <span class="stat-value" id="size-saved">0%</span>
            </div>
            <div class="stat-box" style="align-items: flex-end;">
                <span class="stat-label">New Size</span>
                <span class="stat-value success" id="size-new">0 KB</span>
            </div>
        </div>

        <button class="btn-download" id="dl-btn">💾 Download Compressed Image</button>

        <!-- Hidden canvas for processing -->
        <canvas id="canvas" style="display: none;"></canvas>
    </div>

    <script>
        let currentFile = null;
        let originalImg = new Image();
        let currentQuality = 0.92; // Default to High
        let blobResult = null;

        const elInput = document.getElementById('file-input');
        const elUploadText = document.getElementById('upload-text');
        const elControls = document.getElementById('controls');
        const elStats = document.getElementById('stats');
        const elDlBtn = document.getElementById('dl-btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Format bytes to KB / MB
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Handle Image Upload
        elInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            currentFile = file;
            elUploadText.innerText = file.name.length > 25 ? file.name.substring(0, 25) + '...' : file.name;
            document.getElementById('size-old').innerText = formatBytes(file.size);

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImg.src = event.target.result;
                originalImg.onload = () => {
                    // Unlock UI
                    elControls.style.opacity = '1';
                    elControls.style.pointerEvents = 'all';
                    elStats.style.opacity = '1';
                    elDlBtn.style.opacity = '1';
                    elDlBtn.style.pointerEvents = 'all';
                    
                    processImage();
                };
            };
            reader.readAsDataURL(file);
        });

        // Quality Button Logic
        document.querySelectorAll('.q-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentQuality = parseFloat(e.target.dataset.quality);
                processImage();
            });
        });

        // The Magic Compressor
        function processImage() {
            if (!currentFile) return;

            // Maintain exact original dimensions
            canvas.width = originalImg.width;
            canvas.height = originalImg.height;

            // Draw original image to hidden canvas
            ctx.fillStyle = "#ffffff"; // prevent transparent png to black bg issues
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImg, 0, 0);

            // Compress using toBlob
            canvas.toBlob((blob) => {
                blobResult = blob;
                
                const newSize = blob.size;
                const oldSize = currentFile.size;
                
                // Calculate percentage saved
                let saved = ((oldSize - newSize) / oldSize) * 100;
                
                // Safety net: if compression makes it bigger (happens with tiny images), cap UI
                if (saved < 0) saved = 0; 

                document.getElementById('size-new').innerText = formatBytes(newSize);
                document.getElementById('size-saved').innerText = saved.toFixed(1) + '%';
            }, 'image/jpeg', currentQuality);
        }

        // Download Action
        elDlBtn.addEventListener('click', () => {
            if (!blobResult) return;
            const url = URL.createObjectURL(blobResult);
            const a = document.createElement('a');
            a.href = url;
            // Append _compressed to original filename
            const newName = currentFile.name.replace(/\.[^/.]+$/, "") + "_compressed.jpg";
            a.download = newName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
